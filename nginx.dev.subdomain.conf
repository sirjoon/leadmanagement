# DentraCRM DEV Subdomain NGINX Configuration
# This file is appended to nginx config when dev environment is active

upstream api-dev {
    server api-dev:3000;
}

upstream frontend-dev {
    server frontend-dev:80;
}

# Redirect HTTP → HTTPS for dev
server {
    listen 80;
    server_name dev.magiccrm.geekzlabs.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for dev
server {
    listen 443 ssl http2;
    server_name dev.magiccrm.geekzlabs.com;

    # SSL certificates (same wildcard or separate cert)
    ssl_certificate /etc/letsencrypt/live/dev.magiccrm.geekzlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.magiccrm.geekzlabs.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Client max body size
    client_max_body_size 10M;

    # API routes
    location /api/ {
        proxy_pass http://api-dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://api-dev/health;
    }

    # Tenant-based API routing
    location ~ ^/([a-z0-9-]+)/api/ {
        set $tenant $1;
        rewrite ^/[a-z0-9-]+/api/(.*)$ /api/$1 break;

        proxy_pass http://api-dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-ID $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://frontend-dev;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend catch-all
    location / {
        proxy_pass http://frontend-dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
