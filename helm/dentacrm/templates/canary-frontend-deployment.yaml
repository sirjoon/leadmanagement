{{- if .Values.canary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dentacrm.fullname" . }}-frontend-canary
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dentacrm.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    version: canary
spec:
  replicas: {{ .Values.canary.frontend.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dentacrm.fullname" . }}-frontend
      version: canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "dentacrm.fullname" . }}-frontend
        version: canary
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.registry }}/{{ .Values.api.image.repository | replace "api" "frontend" }}:{{ .Values.canary.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "dentacrm.fullname" . }}-nginx-config
{{- end }}
