{{- if .Values.expenseApi.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dentacrm.fullname" . }}-expense-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dentacrm.labels" . | nindent 4 }}
    app.kubernetes.io/component: expense-api
type: Opaque
data:
  JWT_SECRET: {{ .Values.expenseApi.secrets.jwtSecret | b64enc | quote }}
  DATABASE_URL: {{ .Values.expenseApi.secrets.databaseUrl | b64enc | quote }}
{{- end }}
