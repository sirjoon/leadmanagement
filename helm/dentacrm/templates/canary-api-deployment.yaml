{{- if .Values.canary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dentacrm.fullname" . }}-api-canary
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dentacrm.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    version: canary
spec:
  replicas: {{ .Values.canary.api.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dentacrm.fullname" . }}-api
      version: canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "dentacrm.fullname" . }}-api
        version: canary
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/{{ .Values.api.image.repository }}:{{ .Values.canary.api.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "dentacrm.fullname" . }}-config
            - secretRef:
                name: {{ include "dentacrm.fullname" . }}-secrets
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
